services:
  mongo:
    image: mongo:7
    container_name: pokemon-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: pokemon-backend
    ports:
      - "3000:3000"
    environment:
      MONGO_URI: mongodb://mongo:27017/pokemon-collections
      PORT: "3000"
    depends_on:
      - mongo
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3000
    container_name: pokemon-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo-data: